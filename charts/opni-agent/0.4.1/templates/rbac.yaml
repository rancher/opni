{{- $namespace := printf "%s" (include "opni-agent.namespace" .) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opni-agent
  labels:
    {{- include "opni-agent.labels" . | nindent 4 }}
rules:
- apiGroups:
  - monitoring.opni.io
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
    - ""
  resources:
    - namespaces
  verbs:
    - get
- apiGroups:
    - "monitoring.coreos.com"
  resources:
    - prometheusrules
  verbs:
    - get
    - list
    - watch
- apiGroups:
  - opni.io
  resources:
  - datapreppers/finalizers
  - logadapters/finalizers
  verbs:
  - update
- apiGroups:
  - opni.io
  resources:
  - datapreppers/status
  - logadapters/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - logging.opni.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
    - opni.io
  resources:
    - logadapters
    - datapreppers
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opni-agent
  labels:
    {{- include "opni-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opni-agent
subjects:
  - kind: ServiceAccount
    name: opni-agent
    namespace: {{ $namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opni-agent
  namespace: {{ $namespace }}
  labels:
    {{- include "opni-agent.labels" . | nindent 4 }}
rules:
- apiGroups:
    - ""
  resources:
    - secrets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
- apiGroups:
    - opni.io
  resources:
    - keyrings
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opni-agent
  namespace: {{ $namespace }}
  labels:
    {{- include "opni-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opni-agent
subjects:
  - kind: ServiceAccount
    name: opni-agent
    namespace: {{ $namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opni-agent
  namespace: {{ $namespace }}
  labels:
    {{- include "opni-agent.labels" . | nindent 4 }}